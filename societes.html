<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des sociétés</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

    <div class="logo">
        <img src="images/logo.png" alt="Logo">
        <h1>ComptaConnect</h1>
    </div>

    <button class="btn-deconnexion" onclick="window.location.href='index.html'">
        Déconnexion
    </button>

</header>

<main>

    <h2>🏢 Gestion des sociétés</h2>

    <form id="formSociete">

        <input type="text" id="nom" placeholder="Nom de la société" required>

        <input type="text" id="ville" placeholder="Ville" required>

        <input type="text" id="pays" placeholder="Pays" required>

        <button type="submit">Ajouter</button>

    </form>

    <table>

        <thead>

            <tr>
                <th>Nom</th>
                <th>Ville</th>
                <th>Pays</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody id="listeSocietes">

            <tr>
                <td>Total</td>
                <td>Paris</td>
                <td>France</td>
                <td>
                    <button class="btn-supprimer" onclick="supprimerSociete(this)">
                        🗑️
                    </button>
                </td>
            </tr>

            <tr>
                <td>Orange</td>
                <td>Rabat</td>
                <td>Maroc</td>
                <td>
                    <button class="btn-supprimer" onclick="supprimerSociete(this)">
                        🗑️
                    </button>
                </td>
            </tr>

        </tbody>

    </table>

</main>

<script src="script.js"></script>

</body>

</html>
