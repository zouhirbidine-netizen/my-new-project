<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComptaConnect - Fournisseurs</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

    <div class="logo">
        <img src="images/logo.png" alt="Logo">
        <h1>ComptaConnect</h1>
    </div>

    <button class="btn-deconnexion">Déconnexion</button>

</header>

<main>

<h2>👤 Gestion des fournisseurs</h2>

<form id="formFournisseur">

    <input
    type="text"
    id="nomFournisseur"
    placeholder="Nom du fournisseur"
    required>

    <input
    type="text"
    id="contact"
    placeholder="Contact">

    <input
    type="tel"
    id="telephone"
    placeholder="Téléphone">

    <input
    type="email"
    id="email"
    placeholder="Email">

    <input
    type="text"
    id="adresse"
    placeholder="Adresse">

    <input
    type="text"
    id="ville"
    placeholder="Ville">

    <input
    type="text"
    id="pays"
    placeholder="Pays">

    <input
    type="text"
    id="iban"
    placeholder="IBAN">

    <input
    type="text"
    id="siren"
    placeholder="SIREN">

    <input
    type="text"
    id="siret"
    placeholder="SIRET">

    <select id="statut">

        <option>Actif</option>

        <option>Inactif</option>

    </select>

    <button type="submit">

        Ajouter le fournisseur

    </button>

</form>

<table>

<thead>

<tr>

<th>Nom</th>

<th>Contact</th>

<th>Téléphone</th>

<th>Email</th>

<th>Ville</th>

<th>Pays</th>

<th>Statut</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="listeFournisseurs">

</tbody>

</table>

</main>

<script src="script.js"></script>

</body>

</html>
